{% extends 'base.html' %}
{% block title %}Add Asset - IT HelpDesk{% endblock %}
{% block content %}
<div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Add New Asset</h2>
</div>

<form method="POST" class="space-y-5">

    <!-- Basic Info -->
    <div class="bg-white rounded-xl shadow p-6">
        <h3 class="font-semibold text-gray-700 mb-4 flex items-center gap-2"><i class="fas fa-info-circle text-blue-500"></i> Basic Information</h3>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div>
                <label class="form-label">Asset Name <span class="text-red-500">*</span></label>
                <input type="text" name="name" required class="form-input" placeholder="e.g. Dell Latitude 5420">
            </div>
            <div>
                <label class="form-label">Asset Tag <span class="text-red-500">*</span></label>
                <input type="text" name="asset_tag" required class="form-input" placeholder="e.g. IT-PC-001">
            </div>
            <div>
                <label class="form-label">Site Name</label>
                <input type="text" name="site_name" class="form-input" placeholder="e.g. Head Office">
            </div>
            <div>
                <label class="form-label">Asset Type <span class="text-red-500">*</span></label>
                <select name="asset_type" required class="form-input">
                    {% for t in ['computer','monitor','printer','phone','server','network','other'] %}
                    <option value="{{ t }}">{{ t.title() }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="form-label">Status</label>
                <select name="status" class="form-input">
                    {% for s in ['available','in_use','under_repair','retired'] %}
                    <option value="{{ s }}">{{ s.replace('_',' ').title() }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="form-label">Department</label>
                <select name="department_id" class="form-input">
                    <option value="">None</option>
                    {% for dept in departments %}
                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <!-- Network & User -->
    <div class="bg-white rounded-xl shadow p-6">
        <h3 class="font-semibold text-gray-700 mb-4 flex items-center gap-2"><i class="fas fa-network-wired text-green-500"></i> Network & User Details</h3>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div>
                <label class="form-label">Hostname</label>
                <input type="text" name="hostname" class="form-input" placeholder="e.g. PC-JOHN-01">
            </div>
            <div>
                <label class="form-label">IP Address</label>
                <input type="text" name="ip_address" class="form-input" placeholder="e.g. 192.168.1.100">
            </div>
            <div>
                <label class="form-label">Assigned User</label>
                <select name="assigned_user_id" class="form-input">
                    <option value="">Unassigned</option>
                    {% for user in users %}
                    <option value="{{ user.id }}">{{ user.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="form-label">Team Leader</label>
                <input type="text" name="team_leader" class="form-input" placeholder="Team leader name">
            </div>
            <div>
                <label class="form-label">Designation</label>
                <input type="text" name="designation" class="form-input" placeholder="e.g. Software Engineer">
            </div>
            <div>
                <label class="form-label">Previous Users</label>
                <input type="text" name="previous_users" class="form-input" placeholder="Previous user names">
            </div>
        </div>
    </div>

    <!-- Hardware -->
    <div class="bg-white rounded-xl shadow p-6">
        <h3 class="font-semibold text-gray-700 mb-4 flex items-center gap-2"><i class="fas fa-microchip text-purple-500"></i> Hardware Details</h3>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div>
                <label class="form-label">CPU Model</label>
                <input type="text" name="cpu_model" class="form-input" placeholder="e.g. Intel Core i5-10400">
            </div>
            <div>
                <label class="form-label">CPU Serial No.</label>
                <input type="text" name="cpu_serial" class="form-input font-mono" placeholder="CPU serial number">
            </div>
            <div>
                <label class="form-label">Motherboard</label>
                <input type="text" name="motherboard" class="form-input" placeholder="e.g. Gigabyte H510M H V2">
            </div>
            <div>
                <label class="form-label">SSD Model</label>
                <input type="text" name="ssd_model" class="form-input" placeholder="e.g. WD Blue 250GB">
            </div>
            <div>
                <label class="form-label">Internal HDD Capacity</label>
                <input type="text" name="internal_hdd" class="form-input" placeholder="e.g. 1TB HDD">
            </div>
            <div>
                <label class="form-label">RAM Details</label>
                <input type="text" name="ram_details" class="form-input" placeholder="e.g. 8GB DDR4">
            </div>
            <div>
                <label class="form-label">RAM Type</label>
                <input type="text" name="ram_type" class="form-input" placeholder="e.g. DDR4 3200MHz">
            </div>
            <div>
                <label class="form-label">Operating System</label>
                <input type="text" name="operating_system" class="form-input" placeholder="e.g. Windows 11 Pro">
            </div>
            <div>
                <label class="form-label">Full Serial No. of Asset</label>
                <input type="text" name="full_serial_number" class="form-input font-mono" placeholder="Full asset serial number">
            </div>
        </div>
    </div>

    <!-- Peripherals -->
    <div class="bg-white rounded-xl shadow p-6">
        <h3 class="font-semibold text-gray-700 mb-4 flex items-center gap-2"><i class="fas fa-keyboard text-orange-500"></i> Peripherals</h3>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div>
                <label class="form-label">Monitor Model & Serial No.</label>
                <input type="text" name="monitor_model" class="form-input" placeholder="e.g. Dell E2220H SN:ABC123">
            </div>
            <div>
                <label class="form-label">Mouse Model & Serial No.</label>
                <input type="text" name="mouse_model" class="form-input" placeholder="e.g. Logitech M100 SN:XYZ">
            </div>
            <div>
                <label class="form-label">Keyboard Model & Serial No.</label>
                <input type="text" name="keyboard_model" class="form-input" placeholder="e.g. Dell KB216 SN:DEF">
            </div>
        </div>
    </div>

    <!-- Purchase & Remarks -->
    <div class="bg-white rounded-xl shadow p-6">
        <h3 class="font-semibold text-gray-700 mb-4 flex items-center gap-2"><i class="fas fa-clipboard text-red-500"></i> Purchase & Remarks</h3>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div>
                <label class="form-label">Purchase Date</label>
                <input type="date" name="purchase_date" class="form-input">
            </div>
            <div>
                <label class="form-label">Warranty Expiry</label>
                <input type="date" name="warranty_expiry" class="form-input">
            </div>
        </div>
        <div class="mt-4">
            <label class="form-label">Remarks (Missing Assets / Physical Damage / Other Issues)</label>
            <textarea name="remarks" rows="3" class="form-input" placeholder="Any missing assets, physical damage, or other concerns..."></textarea>
        </div>
    </div>

    <div class="flex gap-3">
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2.5 rounded-lg text-sm">
            <i class="fas fa-save mr-1"></i> Add Asset
        </button>
        <a href="{{ url_for('assets.list') }}" class="border border-gray-300 text-gray-700 px-6 py-2.5 rounded-lg text-sm hover:bg-gray-50">Cancel</a>
    </div>
</form>
{% endblock %}
